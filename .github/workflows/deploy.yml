name: Deploy to Cloud Foundry

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [develop_payasyougo, sandbox_system]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install SAP MTA Build Tool
        run: npm install -g mbt

      - name: Build MTA
        run: mbt build

      - name: Install Cloud Foundry CLI
        run: |
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
          echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install cf8-cli

      - name: Deploy to Cloud Foundry
        env:
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
        run: |
          TARGET_CONFIG=$(cat Target | jq -r '.${{ matrix.target }}[0]')
          API=$(echo $TARGET_CONFIG | jq -r '.apiCF')
          ORG=$(echo $TARGET_CONFIG | jq -r '.orgName')
          SPACE=$(echo $TARGET_CONFIG | jq -r '.space')
          MTA_EXT=$(echo $TARGET_CONFIG | jq -r '.mtaExtensionDescriptor')
          
          cf login -a $API -u $CF_USERNAME -p $CF_PASSWORD -o $ORG -s $SPACE
          
          if [ -n "$MTA_EXT" ]; then
            cf deploy mta_archives/*.mtar -e $MTA_EXT
          else
            cf deploy mta_archives/*.mtar
          fi