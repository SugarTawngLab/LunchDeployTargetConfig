<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lunch Deploy Target Config</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f4ef;
        --card: #fffdf8;
        --text: #1f2937;
        --accent: #0f766e;
        --border: #d6d3d1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, #d9f99d 0, transparent 28%),
          linear-gradient(135deg, #fef3c7, var(--bg));
        color: var(--text);
      }

      main {
        max-width: 720px;
        margin: 64px auto;
        padding: 0 20px;
      }

      .card {
        background: rgba(255, 253, 248, 0.92);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 16px;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      a {
        color: var(--accent);
        text-decoration-thickness: 2px;
        text-underline-offset: 2px;
      }

      code {
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Lunch Deploy Target Config</h1>
        <p>This site publishes the deployment target data as a public JSON file.</p>
        <p>
          JSON URL:
          <a href="./Target.json"><code>Target.json</code></a>
        </p>
      </section>
    </main>
  </body>
</html>
